# Pre-commit security configuration for Snowflake MCP Server Setup
# Author: SE Community
# Purpose: Prevent credential leaks and security violations

repos:
  # Detect secrets and credentials
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock.json

  # Additional secret detection (gitleaks)
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=5000']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict

  # Check for .cursor/ files (stealth compliance)
  - repo: local
    hooks:
      - id: check-cursor-files
        name: Block .cursor/ files
        entry: bash -c 'if git diff --cached --name-only | grep -q "^\.cursor/"; then echo "ERROR - .cursor/ files must not be committed (stealth violation)"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: check-gitignore-exists
        name: Block .gitignore files
        entry: bash -c 'if git diff --cached --name-only | grep -q "^\.gitignore$"; then echo "ERROR - .gitignore must not be committed (use global ignore)"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: check-personal-names
        name: Check for personal names (anonymization)
        entry: bash -c 'if git diff --cached | grep -iE "(michael|whitaker|mike)" | grep -v "# michael" | grep -v "SE Community"; then echo "WARNING - Personal name detected - ensure SE Community attribution"; exit 0; fi'
        language: system
        pass_filenames: false

  # SQL-specific checks
  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 3.0.0
    hooks:
      - id: sqlfluff-lint
        args: [--dialect, snowflake]
      - id: sqlfluff-fix
        args: [--dialect, snowflake]

  # Python formatting and linting
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        language_version: python3.10

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args: ['--max-line-length=99', '--extend-ignore=E203,W503']
