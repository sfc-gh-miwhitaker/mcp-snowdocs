# Pytest configuration for Snowflake MCP Server Setup
# Author: SE Community

[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = python/tests

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Coverage with missing lines
    --cov=python
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    # Fail if coverage below 80%
    --cov-fail-under=80
    # Show warnings
    -W default
    # Strict markers
    --strict-markers
    # Show summary of all test types
    -ra

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may require Snow CLI)
    slow: Slow tests (may take >1 second)

# Coverage options
[coverage:run]
source = python
omit =
    python/tests/*
    *__pycache__*

[coverage:report]
precision = 2
show_missing = True
fail_under = 80
